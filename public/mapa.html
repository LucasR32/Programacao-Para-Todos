<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mapa de pontos de Wi-Fi gratuito na comunidade para alunos do projeto PPT." />
  <meta property="og:title" content="PPT | Pontos de Wi-Fi Gratuito" />
  <meta property="og:description" content="Encontre locais com internet gratuita para estudar programação fora da escola." />
  <!-- <meta name="google-maps-api-key" content="COLOQUE_SUA_CHAVE_AQUI" /> -->
  <title>PPT | Pontos de Wi-Fi Gratuito</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    .page-header { background: #ffffff; border-bottom: 1px solid #e2e8f0; }
    .header-inner { max-width: 1120px; margin: 0 auto; padding: 20px 24px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; align-items: center; }
    .brand { font-weight: 700; font-size: 1rem; color: #2563eb; }
    .main-nav { display: flex; flex-wrap: wrap; gap: 18px; color: #475569; }
    .main-nav a:hover { color: #1d4ed8; }
    main { min-height: calc(100vh - 140px); }
    .hero { padding: 32px 24px 16px; max-width: 1120px; margin: 0 auto; }
    .hero h1 { margin: 0 0 12px; font-size: clamp(2rem, 4vw, 3rem); line-height: 1.05; }
    .hero p { margin: 0; color: #475569; max-width: 720px; }
    .content-grid { display: grid; gap: 24px; padding: 24px; max-width: 1120px; margin: 0 auto; }
    .map-layout { display: grid; gap: 24px; }
    .map-panel { min-height: 64vh; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; overflow: hidden; }
    #mapa-container { width: 100%; height: 100%; min-height: 420px; }
    .sidebar { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; padding: 20px; display: grid; gap: 16px; }
    .sidebar h2 { margin: 0 0 8px; font-size: 1.25rem; }
    .ponto-item { padding: 16px; border: 1px solid #e2e8f0; border-radius: 18px; background: #f8fafc; transition: border-color 200ms ease, box-shadow 200ms ease; }
    .ponto-item.active { border-color: #2563eb; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.12); }
    .ponto-item h3 { margin: 0 0 8px; font-size: 1rem; }
    .ponto-item p { margin: 4px 0; color: #475569; font-size: 0.95rem; }
    .ponto-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.9rem; color: #334155; }
    .btn-route { display: inline-flex; align-items: center; justify-content: center; margin-top: 12px; padding: 10px 16px; border-radius: 999px; background: #2563eb; color: #ffffff; border: none; font-weight: 600; }
    .btn-route:hover { background: #1d4ed8; }
    .page-footer { background: #ffffff; border-top: 1px solid #e2e8f0; }
    .footer-inner { max-width: 1120px; margin: 0 auto; padding: 20px 24px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; color: #475569; font-size: 0.95rem; }
    @media (min-width: 900px) {
      .map-layout { grid-template-columns: 1.6fr 0.9fr; align-items: start; min-height: calc(100vh - 240px); }
      .map-panel { min-height: calc(100vh - 240px); }
    }
    @media (max-width: 899px) {
      .map-panel { min-height: 56vh; }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="header-inner">
      <a class="brand" href="index.html">Programação Para Todos</a>
      <nav class="main-nav" aria-label="Navegação principal">
        <a href="index.html">Início</a>
        <a href="trilha.html?id=frontend">Trilhas</a>
        <a href="mapa.html">Mapa Wi-Fi</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Pontos de Wi-Fi Gratuito</h1>
      <p>Encontre locais com internet gratuita na região para estudar programação fora da escola.</p>
    </section>

    <section class="content-grid">
      <div class="map-layout">
        <div class="map-panel">
          <div id="mapa-container"></div>
        </div>
        <aside class="sidebar" aria-label="Lista de pontos de Wi-Fi gratuito">
          <h2>Pontos de Wi-Fi</h2>
          <div id="pontos-list"></div>
        </aside>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <div class="footer-inner">
      <span>PPT • Conectados pela Comunidade SENAI • 2026</span>
      <a href="https://github.com">GitHub</a>
    </div>
  </footer>

  <script type="module" src="js/mapa.js"></script>
</body>
</html>
